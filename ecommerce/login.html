<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManShop - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .text-cp_palette_secondary {
      color: var(--palette-secondary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }

    /* Essential Custom Classes replaced by Tailwind utilities */
    input:focus {
      outline: none;
      border-color: var(--palette-primary) !important;
      box-shadow: 0 0 0 3px rgba(27, 58, 107, 0.1);
    }
  </style>
</head>

<body>

  <!-- Nav -->
  <header>
    <nav class="bg-cp_palette_primary shadow-lg">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="../index.html"
            class="text-cp_text_tertiary opacity-70 hover:text-cp_text_tertiary text-xs flex items-center gap-1 transition">←
            Portfolio</a>
          <div class="w-px h-5 bg-cp_text_tertiary opacity-30"></div>
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg p-1 bg-cp_palette_secondary overflow-hidden flex items-center justify-center font-bold text-white text-xs">
              <img src="../assets/logoipsum-409.png" class="object-cover w-full h-full" alt="logo">
            </div>
            <span class="text-white font-bold text-lg">ManShop</span>
          </a>
        </div>
        <div class="flex items-center gap-4">
          <a href="signup.html"
            class="text-cp_text_tertiary opacity-80 hover:text-cp_text_tertiary text-sm transition">Create Account</a>
          <a href="cart.html"
            class="px-4 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition"><img
              src="./assets/shopping-cart-add.png" />
            Cart</a>
        </div>
      </div>
    </nav>
  </header>
  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <section class="min-h-screen flex items-center justify-center px-4 py-16">
      <div class="w-full max-w-md">
        <div class="bg-cp_background_paper rounded-2xl shadow-xl border border-cp_borders_main overflow-hidden">
          <!-- Top bar -->
          <div class="bg-cp_palette_primary p-6 text-center">
            <div
              class="w-14 h-14 rounded-2xl bg-cp_palette_secondary flex items-center justify-center text-2xl mx-auto mb-3">
              <img src="./assets/shopping-cart-add.png" />
            </div>
            <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
            <p class="text-cp_text_tertiary opacity-80 text-sm mt-1">Sign in to your ManShop account</p>
          </div>
          <div class="p-8">
            <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-5">
            </div>
            <div class="space-y-5">
              <div>
                <label class="block text-sm font-semibold text-cp_palette_primary mb-2">Email Address</label>
                <input id="email" type="email" placeholder="you@example.com"
                  class="w-full border border-cp_borders_main rounded-xl px-4 py-3 text-sm text-cp_text_primary transition" />
              </div>
              <div>
                <label class="block text-sm font-semibold text-cp_palette_primary mb-2">Password</label>
                <div class="relative">
                  <input id="password" type="password" placeholder="••••••••"
                    class="w-full border border-cp_borders_main rounded-xl px-4 py-3 text-sm text-cp_text_primary pr-12 transition" />
                  <button type="button" onclick="togglePass()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-cp_text_secondary hover:text-cp_text_primary text-lg">👁</button>
                </div>
              </div>
              <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" id="remember" class="rounded border-cp_borders_main text-cp_palette_primary">
                  <span class="text-sm text-cp_text_secondary">Remember me</span>
                </label>
                <a href="#" class="text-sm text-cp_palette_secondary hover:underline">Forgot password?</a>
              </div>
              <button onclick="doLogin()"
                class="w-full bg-cp_palette_primary text-white transition-all duration-200 hover:bg-[#0d2447] py-3 rounded-xl font-semibold text-white">Sign
                In</button>
            </div>
            <div class="mt-6 pt-6 border-t border-cp_borders_main text-center">
              <p class="text-sm text-cp_text_secondary">Don't have an account? <a href="signup.html"
                  class="font-semibold text-cp_palette_secondary hover:underline">Create one free</a></p>
            </div>
            <!-- Demo credentials -->
            <div
              class="mt-4 p-4 bg-cp_palette_primary bg-opacity-10 rounded-xl border border-cp_palette_primary border-opacity-20">
              <p class="text-xs font-semibold text-cp_palette_primary mb-2">Demo Credentials</p>
              <p class="text-xs text-cp_text_secondary">Email: <span
                  class="font-mono font-semibold">demo@manshop.com</span></p>
              <p class="text-xs text-cp_text_secondary">Password: <span class="font-mono font-semibold">demo123</span>
              </p>
              <button onclick="fillDemo()"
                class="mt-2 text-xs text-cp_palette_secondary hover:underline font-semibold">Auto-fill Demo →</button>
            </div>
          </div>
        </div>
        <p class="text-center mt-6 text-sm text-cp_text_secondary"><a href="index.html"
            class="hover:text-cp_palette_primary transition">←
            Back to ManShop</a></p>
      </div>
    </section>
  </main>

  <script>
    // Pre-register demo user
    const users = JSON.parse(localStorage.getItem('manpower_users') || '[]');
    if (!users.find(u => u.email === 'demo@manshop.com')) {
      users.push({ name: 'Demo User', email: 'demo@manshop.com', password: 'demo123' });
      localStorage.setItem('manpower_users', JSON.stringify(users));
    }

    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
    function fillDemo() {
      document.getElementById('email').value = 'demo@manshop.com';
      document.getElementById('password').value = 'demo123';
    }
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      if (!email || !pass) { showError('Please fill in all fields.'); return; }
      if (!/\S+@\S+\.\S+/.test(email)) { showError('Please enter a valid email.'); return; }
      const users = JSON.parse(localStorage.getItem('manpower_users') || '[]');
      const user = users.find(u => u.email === email && u.password === pass);
      if (!user) { showError('Invalid email or password.'); return; }
      localStorage.setItem('manpower_user', JSON.stringify({ name: user.name, email: user.email }));
      const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
      location.href = redirect;
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>

</html>
