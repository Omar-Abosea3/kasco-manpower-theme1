<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManShop - Wishlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .text-cp_palette_secondary {
      color: var(--palette-secondary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }

    /* Essential Custom Classes replaced by Tailwind utilities */
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="bg-cp_palette_primary shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="../index.html"
            class="text-cp_text_tertiary opacity-70 hover:text-cp_text_tertiary text-xs transition">← Portfolio</a>
          <div class="w-px h-5 bg-cp_text_tertiary opacity-30"></div>
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg p-1 bg-cp_palette_secondary overflow-hidden flex items-center justify-center font-bold text-white text-xs">
              <img src="../assets/logoipsum-409.png" class="object-cover w-full h-full" alt="logo">
            </div>
            <span class="text-white font-bold text-lg">ManShop</span>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html"
            class="text-cp_text_tertiary opacity-80 hover:text-cp_text_tertiary text-sm transition">Home</a>
          <a href="products.html"
            class="text-cp_text_tertiary opacity-80 hover:text-cp_text_tertiary text-sm transition">Products</a>
          <a href="wishlist.html" class="text-white text-sm font-medium border-b-2 border-secondary pb-0.5">Wishlist</a>
          <a href="orders.html"
            class="text-cp_text_tertiary opacity-80 hover:text-cp_text_tertiary text-sm transition">Orders</a>
          <a href="cart.html"
            class="flex items-center gap-1 px-4 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition">
            <img src="./assets/shopping-cart-add.png" /> Cart <span id="nav-cart-count"
              class="ml-1 bg-white text-cp_palette_primary text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
          </a>
          <a href="login.html" id="nav-login-btn"
            class="text-cp_text_tertiary opacity-80 hover:text-cp_text_tertiary text-sm transition">Login</a>
        </div>
      </div>
    </nav>
  </header>
  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <section class="bg-cp_palette_primary py-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold text-white mb-1">My Wishlist ❤️</h1>
          <p id="wl-count" class="text-cp_text_tertiary opacity-80 text-sm"></p>
        </div>
        <button onclick="clearWishlist()"
          class="px-4 py-2 rounded-lg border border-red-500 border-opacity-50 text-red-400 hover:bg-red-500 hover:bg-opacity-30 text-sm font-medium transition">Clear
          Wishlist</button>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div id="empty-state" class="hidden text-center py-20">
        <div class="text-6xl mb-4">🤍</div>
        <h2 class="text-2xl font-bold text-cp_palette_primary mb-2">Your Wishlist is Empty</h2>
        <p class="text-cp_text_secondary mb-6">Save products you love to find them easily later.</p>
        <a href="products.html"
          class="px-8 py-3 rounded-xl bg-cp_palette_primary text-white font-semibold hover:bg-cp_palette_primary hover:brightness-75 transition">Browse
          Products →</a>
      </div>

      <div id="wishlist-actions" class="hidden justify-between items-center mb-6">
        <span class="text-sm text-cp_text_secondary"></span>
        <button onclick="addAllToCart()"
          class="px-6 py-2.5 rounded-xl bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition"><img
            src="./assets/shopping-cart-add.png" />
          Add All to Cart</button>
      </div>

      <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </section>
  </main>

  <footer class="bg-cp_palette_primary py-8 mt-8">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-cp_text_secondary text-sm">© 2026 ManShop. <a href="../index.html"
          class="text-cp_text_secondary hover:text-cp_palette_secondary transition">← Portfolio</a></p>
    </div>
  </footer>

  <script>
    function getCart() { try { return JSON.parse(localStorage.getItem('manpower_cart') || '[]'); } catch (e) { return []; } }
    function getWishlist() { try { return JSON.parse(localStorage.getItem('manpower_wishlist') || '[]'); } catch (e) { return []; } }
    function setCart(c) { localStorage.setItem('manpower_cart', JSON.stringify(c)); updateNav(); }
    function setWishlist(w) { localStorage.setItem('manpower_wishlist', JSON.stringify(w)); render(); }

    function updateNav() {
      document.getElementById('nav-cart-count').textContent = getCart().reduce((s, i) => s + i.qty, 0);
    }

    function removeFromWishlist(id) {
      let wl = getWishlist();
      setWishlist(wl.filter(x => x.id !== id));
    }

    function clearWishlist() {
      if (!confirm('Remove all items from wishlist?')) return;
      setWishlist([]);
    }

    function addToCart(id) {
      const p = getWishlist().find(x => x.id === id);
      if (!p) return;
      let cart = getCart();
      const idx = cart.findIndex(x => x.id === id);
      if (idx >= 0) cart[idx].qty++;
      else cart.push({ ...p, qty: 1 });
      setCart(cart);
      showToast('Added to cart!', '<img src="./assets/shopping-cart-add.png" />');
    }

    function addAllToCart() {
      const wl = getWishlist();
      let cart = getCart();
      wl.forEach(p => {
        const idx = cart.findIndex(x => x.id === p.id);
        if (idx >= 0) cart[idx].qty++;
        else cart.push({ ...p, qty: 1 });
      });
      setCart(cart);
      showToast(`${wl.length} items added to cart!`, '<img src="./assets/shopping-cart-add.png" />');
    }

    function showToast(msg, icon = '✅') {
      const t = document.createElement('div');
      t.className = 'fixed bottom-4 right-4 z-50 bg-cp_palette_primary text-cp_text_tertiary px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 text-sm font-medium';
      t.innerHTML = `<span>${icon}</span> ${msg}`;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    function render() {
      const wl = getWishlist();
      updateNav();

      document.getElementById('wl-count').textContent = `${wl.length} saved item${wl.length !== 1 ? 's' : ''}`;

      if (wl.length === 0) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('wishlist-actions').classList.remove('flex');
        document.getElementById('wishlist-actions').classList.add('hidden');
        document.getElementById('wishlist-grid').innerHTML = '';
        return;
      }

      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('wishlist-actions').classList.remove('hidden');
      document.getElementById('wishlist-actions').classList.add('flex');

      document.getElementById('wishlist-grid').innerHTML = wl.map(p => {
        const disc = Math.round((1 - p.price / p.original) * 100);
        return `<div class="bg-cp_background_paper rounded-xl border border-cp_borders_main transition-all duration-300 ease-in-out hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(27,58,107,0.15)] overflow-hidden">
      <div class="relative bg-cp_background_default h-48 overflow-hidden group">
        <a href="product-details.html?id=${p.id}"><img src="${p.image || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&h=400'}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"></a>
        <button onclick="removeFromWishlist(${p.id})" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-red-500 hover:bg-red-50 transition text-lg" title="Remove from wishlist">❤️</button>
        ${disc > 0 ? `<span class="absolute top-3 left-3 inline-block px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-red-500 text-white">-${disc}%</span>` : ''}
      </div>
      <div class="p-4">
        <div class="text-xs text-cp_text_secondary mb-1">${p.brand} · ${p.sub}</div>
        <a href="product-details.html?id=${p.id}"><h3 class="font-semibold text-cp_palette_primary text-sm leading-snug mb-2 hover:text-cp_palette_secondary transition">${p.name}</h3></a>
        <div class="flex items-center gap-1 mb-3">
          <span class="text-yellow-500 text-xs">${'★'.repeat(Math.floor(p.rating))}</span>
          <span class="text-xs text-cp_text_secondary">${p.rating}</span>
        </div>
        <div class="flex items-center justify-between mb-4">
          <div>
            <span class="font-bold text-cp_palette_primary">$${p.price.toFixed(2)}</span>
            ${p.original > p.price ? `<span class="text-xs text-cp_text_secondary line-through ml-1">$${p.original.toFixed(2)}</span>` : ''}
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="addToCart(${p.id})" class="flex-1 py-2.5 rounded-lg bg-cp_palette_primary text-white text-sm font-semibold hover:bg-cp_palette_primary hover:brightness-75 transition flex items-center justify-center gap-2"><img src="./assets/shopping-cart-add.png" /> Add to Cart</button>
          <button onclick="removeFromWishlist(${p.id})" class="w-10 rounded-lg border border-cp_borders_main flex items-center justify-center text-cp_text_secondary hover:text-red-500 hover:border-red-500 hover:border-opacity-30 transition">🗑</button>
        </div>
      </div>
    </div>`;
      }).join('');
    }

    render();
    const user = JSON.parse(localStorage.getItem('manpower_user') || 'null');
    if (user) { document.getElementById('nav-login-btn').textContent = '👤 ' + user.name.split(' ')[0]; document.getElementById('nav-login-btn').href = 'orders.html'; }
  </script>
</body>

</html>
