  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .text-cp_palette_secondary {
      color: var(--palette-secondary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }

    /* Essential Custom Classes replaced by Tailwind utilities */
    input:focus,
    select:focus {
      outline: none;
      border-color: var(--palette-primary) !important;
    }
  </style>
</head>

  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <!-- Page header -->
    <section class="bg-cp_palette_primary py-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-cp_text_tertiary mb-2">All Products</h1>
        <p class="text-cp_text_tertiary opacity-80 text-sm">Discover our full collection of premium products</p>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex gap-8">

        <!-- Sidebar Filters -->
        <aside class="hidden lg:block w-64 flex-shrink-0">
          <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main p-5 sticky top-24">
            <div class="flex justify-between items-center mb-5">
              <h3 class="font-bold text-cp_palette_primary">Filters</h3>
              <button onclick="clearFilters()" class="text-xs text-cp_palette_secondary hover:underline">Clear
                All</button>
            </div>

            <!-- Search -->
            <div class="border-b border-cp_borders_main pb-4 mb-4">
              <label class="text-sm font-semibold text-cp_palette_primary block mb-2">Search</label>
              <input id="search-input" type="text" placeholder="Search products..." oninput="applyFilters()"
                class="w-full border border-cp_borders_main rounded-lg px-3 py-2 text-sm transition" />
            </div>

            <!-- Categories -->
            <div class="border-b border-cp_borders_main pb-4 mb-4">
              <label class="text-sm font-semibold text-cp_palette_primary block mb-3">Category</label>
              <div class="space-y-2" id="cat-filters">
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="Electronics" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  Electronics</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="Fashion" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  Fashion</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="Home" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded"> Home &
                  Living</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="Beauty" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  Beauty</label>
              </div>
            </div>

            <!-- Brands -->
            <div class="border-b border-cp_borders_main pb-4 mb-4">
              <label class="text-sm font-semibold text-cp_palette_primary block mb-3">Brand</label>
              <div class="space-y-2" id="brand-filters">
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="SoundPro" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  SoundPro</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="ViewTech" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  ViewTech</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="StyleCo" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  StyleCo</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="DenimX" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  DenimX</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="SpeedFit" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  SpeedFit</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="GlowSkin" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  GlowSkin</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="KeyMaster" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">
                  KeyMaster</label>
                <label class="flex items-center gap-2 cursor-pointer text-sm text-cp_text_primary"><input
                    type="checkbox" value="LuxeWear" onchange="applyFilters()" class="accent-[var(--palette-primary)] rounded">

                    class="filter-checkbox sub-filter rounded">

                    type="checkbox" value="Dresses" onchange="applyFilters()"
                    class="filter-checkbox sub-filter rounded">
                  Dresses</label>

                    class="filter-checkbox sub-filter rounded">

                  Skincare</label>

              <div class="space-y-3">

            <div class="flex items-center gap-2 flex-wrap">

              <!-- Mobile filter btn -->

            <div class="mb-3"><label class="text-xs font-semibold text-cp_palette_primary">Search</label><input
                id="m-search" type="text"
                oninput="document.getElementById('search-input').value=this.value;applyFilters()"
                placeholder="Search..."
                class="w-full mt-1 border border-cp_borders_main rounded-lg px-3 py-2 text-sm" /></div>
            <div class="mb-3"><label class="text-xs font-semibold text-cp_palette_primary">Category</label>
              <div class="flex flex-wrap gap-2 mt-1">
                <label class="flex items-center gap-1 text-xs"><input type="checkbox" value="Electronics"

                <label class="flex items-center gap-1 text-xs"><input type="checkbox" value="Fashion"

                <label class="flex items-center gap-1 text-xs"><input type="checkbox" value="Home"

                <label class="flex items-center gap-1 text-xs"><input type="checkbox" value="Beauty"
                    onchange="applyFilters()" class="filter-checkbox"> Beauty</label>
              </div>
            </div>
          </div>

          <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>

          <!-- Pagination -->
          <div id="pagination" class="flex justify-center items-center gap-2 mt-10"></div>

          <!-- Empty state -->
          <div id="empty-state" class="hidden text-center py-20">
            <div class="text-5xl mb-4">🔍</div>
            <h3 class="text-xl font-bold text-cp_palette_primary mb-2">No Products Found</h3>
            <p class="text-cp_text_secondary text-sm mb-4">Try adjusting your filters or search term.</p>
            <button onclick="clearFilters()"
              class="px-6 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold">Clear
              Filters</button>
          </div>
        </main>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-cp_palette_primary py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <p class="text-cp_text_secondary text-sm">© 2026 ManShop. <a href="../index.html"

      { id: 12, name: "Anti-Aging Serum", price: 79.99, original: 99.99, rating: 4.9, reviews: 2876, cat: "Beauty", brand: "GlowSkin", sub: "Skincare", image: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&w=400&h=400", bestseller: true, toprated: true, specs: [{ label: "Volume", value: "30ml" }, { label: "Key Ingredient", value: "Retinol 1%" }, { label: "Skin Type", value: "All Types" }], reviewsList: [{ user: "Grace T.", rating: 5, date: "3/02/2026", comment: "Visible results in just two weeks!" }] },
      { id: 13, name: "Moisturizing Face Cream", price: 49.99, original: 64.99, rating: 4.6, reviews: 1432, cat: "Beauty", brand: "GlowSkin", sub: "Skincare", image: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&w=400&h=400", bestseller: false, toprated: false, specs: [{ label: "Volume", value: "50ml" }, { label: "Key Ingredient", value: "Hyaluronic Acid" }, { label: "Texture", value: "Non-Greasy" }], reviewsList: [{ user: "BeautyFan", rating: 4, date: "2/22/2026", comment: "Hydrates well, good base for makeup." }] },
      { id: 14, name: "Wireless Gaming Mouse", price: 79.99, original: 99.99, rating: 4.5, reviews: 2045, cat: "Electronics", brand: "KeyMaster", sub: "Accessories", image: "https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?auto=format&fit=crop&w=400&h=400", bestseller: false, toprated: false, specs: [{ label: "DPI", value: "16,000" }, { label: "Sensors", value: "Hero 25K" }, { label: "Weight", value: "63g" }], reviewsList: [{ user: "GamerPro", rating: 5, date: "1/12/2026", comment: "Insanely light and precise." }] },
      { id: 15, name: "Yoga Mat Premium", price: 54.99, original: 69.99, rating: 4.7, reviews: 889, cat: "Home", brand: "FitLife", sub: "Fitness", image: "https://images.unsplash.com/photo-1592194996308-7b43878e84a6?auto=format&fit=crop&w=400&h=400", bestseller: false, toprated: true, specs: [{ label: "Thickness", value: "6mm" }, { label: "Material", value: "TPE Eco-Friendly" }, { label: "Grip", value: "Non-Slip" }], reviewsList: [{ user: "YogiM", rating: 5, date: "3/05/2026", comment: "Excellent grip, even when sweating." }] },
      { id: 16, name: "Cashmere Sweater", price: 149.99, original: 199.99, rating: 4.8, reviews: 321, cat: "Fashion", brand: "LuxeWear", sub: "Tops", image: "https://images.unsplash.com/photo-1576566582418-dc6f578491c6?auto=format&fit=crop&w=400&h=400", bestseller: false, toprated: true, specs: [{ label: "Material", value: "100% Cashmere" }, { label: "Origin", value: "Mongolia" }, { label: "Weight", value: "Lightweight" }], reviewsList: [{ user: "LuxuryLover", rating: 5, date: "2/10/2026", comment: "So soft and warm. Pure luxury." }] },
      { id: 17, name: "Bluetooth Speaker", price: 89.99, original: 119.99, rating: 4.6, reviews: 1754, cat: "Electronics", brand: "SoundPro", sub: "Speakers", image: "https://images.unsplash.com/photo-1608156639585-3bc7b5e40e6c?auto=format&fit=crop&w=400&h=400", bestseller: true, toprated: false, specs: [{ label: "Output", value: "20W" }, { label: "Waterproof", value: "IPX7" }, { label: "Playtime", value: "12 Hours" }], reviewsList: [{ user: "MusicMan", rating: 4, date: "3/01/2026", comment: "Loud enough for outdoor parties." }] },
      { id: 18, name: "Linen Bedding Set", price: 129.99, original: 169.99, rating: 4.7, reviews: 543, cat: "Home", brand: "DreamHome", sub: "Bedding", image: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&w=400&h=400", bestseller: false, toprated: false, specs: [{ label: "Material", value: "100% French Linen" }, { label: "Set Includes", value: "Duvet + 2 Shams" }, { label: "Care", value: "Wash Cold" }], reviewsList: [{ user: "CozyHome", rating: 5, date: "1/30/2026", comment: "Best sleep ever, very breathable." }] },
    ];

    const PER_PAGE = 9;
    let currentPage = 1;
    let filtered = [...PRODUCTS];

    function getCart() { try { return JSON.parse(localStorage.getItem('manpower_cart') || '[]'); } catch (e) { return []; } }
    function getWishlist() { try { return JSON.parse(localStorage.getItem('manpower_wishlist') || '[]'); } catch (e) { return []; } }
    function setCart(c) { localStorage.setItem('manpower_cart', JSON.stringify(c)); updateNavCount(); }
    function setWishlist(w) { localStorage.setItem('manpower_wishlist', JSON.stringify(w)); updateNavCount(); }

    function updateNavCount() {
      const cart = getCart();
      const wl = getWishlist();
      document.getElementById('nav-cart-count').textContent = cart.reduce((s, i) => s + i.qty, 0);
      const wlEl = document.getElementById('nav-wishlist-count');
      if (wl.length > 0) { wlEl.textContent = wl.length; wlEl.classList.remove('hidden'); } else { wlEl.classList.add('hidden'); }
    }

    function syncPrice() {
      const mn = parseInt(document.getElementById('min-price').value);
      const mx = parseInt(document.getElementById('max-price').value);
      document.getElementById('min-display').textContent = mn;
      document.getElementById('max-display').textContent = mx;
      applyFilters();
    }

    function getChecked(cls) {
      return [...document.querySelectorAll('.' + cls + ':checked')].map(el => el.value);
    }

    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const cats = getChecked('filter-checkbox').filter(v => ['Electronics', 'Fashion', 'Home', 'Beauty'].includes(v));
      const brands = getChecked('filter-checkbox').filter(v => !['Electronics', 'Fashion', 'Home', 'Beauty'].includes(v) && !document.querySelector('.sub-filter[value="' + v + '"]'));
      const subs = getChecked('sub-filter');
      const mn = parseInt(document.getElementById('min-price').value);
      const mx = parseInt(document.getElementById('max-price').value);
      const sort = document.getElementById('sort-select').value;

      filtered = PRODUCTS.filter(p => {
        if (search && !p.name.toLowerCase().includes(search) && !p.brand.toLowerCase().includes(search)) return false;
        if (cats.length && !cats.includes(p.cat)) return false;
        if (brands.length && !brands.includes(p.brand)) return false;
        if (subs.length && !subs.includes(p.sub)) return false;
        if (p.price < mn || p.price > mx) return false;
        return true;
      });

      if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
      else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
      else if (sort === 'reviews') filtered.sort((a, b) => b.reviews - a.reviews);
      else if (sort === 'discount') filtered.sort((a, b) => (b.original - b.price) / b.original - (a.original - a.price) / a.original);

      currentPage = 1;
      renderProducts();
    }

    function clearFilters() {
      document.querySelectorAll('.filter-checkbox').forEach(el => el.checked = false);
      document.getElementById('search-input').value = '';
      document.getElementById('min-price').value = 0;
      document.getElementById('max-price').value = 400;
      document.getElementById('min-display').textContent = '0';
      document.getElementById('max-display').textContent = '400';
      document.getElementById('sort-select').value = 'default';
      applyFilters();
    }

    function addToCart(id) {
      const p = PRODUCTS.find(x => x.id === id);
      let cart = getCart();
      const idx = cart.findIndex(x => x.id === id);
      if (idx >= 0) cart[idx].qty++;
      else cart.push({ ...p, qty: 1 });
      setCart(cart);
      showToast('Added to cart!', '<img src="./assets/shopping-cart-add.png" />');
    }

    function toggleWishlist(id) {
      let wl = getWishlist();
      const idx = wl.findIndex(x => x.id === id);
      if (idx >= 0) { wl.splice(idx, 1); showToast('Removed from wishlist', '💔'); }
      else { const p = PRODUCTS.find(x => x.id === id); wl.push(p); showToast('Added to wishlist!', '❤️'); }
      setWishlist(wl);
      renderProducts();
    }

    function showToast(msg, icon = '✅') {
      const t = document.createElement('div');
      t.className = 'fixed bottom-4 right-4 z-50 bg-cp_palette_primary text-cp_text_tertiary px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 text-sm font-medium';
      t.innerHTML = `<span>${icon}</span> ${msg}`;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    function renderProducts() {
      const total = filtered.length;
      const pages = Math.ceil(total / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const page = filtered.slice(start, start + PER_PAGE);
      const wl = getWishlist();

      document.getElementById('results-count').textContent = `${total} product${total !== 1 ? 's' : ''} found`;

      if (total === 0) {
        document.getElementById('products-grid').innerHTML = '';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }
      document.getElementById('empty-state').classList.add('hidden');

      document.getElementById('products-grid').innerHTML = page.map(p => {
        const isWL = wl.some(x => x.id === p.id);
        const disc = Math.round((1 - p.price / p.original) * 100);
        return `<div class="bg-cp_background_paper rounded-xl border border-cp_borders_main transition-all duration-300 ease-in-out hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(27,58,107,0.15)] overflow-hidden">
      <div class="relative bg-cp_background_default h-48 overflow-hidden group">
        <a href="product-details.html?id=${p.id}"><img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"></a>
        <button onclick="toggleWishlist(${p.id})" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-lg transition ${isWL ? 'text-red-500' : 'text-gray-300 hover:text-red-400'}">
          ${isWL ? '<img src="./assets/heart.png" />' : '<img src="./assets/empty-heart.png" />'}
        </button>
        ${p.bestseller ? '<span class="absolute top-3 left-3 inline-block px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-cp_palette_secondary text-white">Best Seller</span>' : ''}
        ${disc > 0 ? `<span class="absolute bottom-3 right-3 inline-block px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-red-500 text-white">-${disc}%</span>` : ''}
      </div>
      <div class="p-4">
        <div class="text-xs text-cp_text_secondary mb-1">${p.brand} · ${p.sub}</div>
        <a href="product-details.html?id=${p.id}"><h3 class="font-semibold text-cp_palette_primary text-sm leading-snug mb-2 hover:text-cp_palette_secondary transition">${p.name}</h3></a>
        <div class="flex items-center gap-1 mb-3">
          <span class="text-yellow-500 text-xs">${'★'.repeat(Math.floor(p.rating))}</span>
          <span class="text-xs text-cp_text_secondary">${p.rating} (${p.reviews.toLocaleString()})</span>
        </div>
        <div class="flex items-center justify-between mb-3">
          <div>
            <span class="font-bold text-cp_palette_primary">$${p.price.toFixed(2)}</span>
            ${p.original > p.price ? `<span class="text-xs text-cp_text_secondary line-through ml-1">$${p.original.toFixed(2)}</span>` : ''}
          </div>
        </div>
        <button onclick="addToCart(${p.id})" class="w-full py-2.5 rounded-lg bg-cp_palette_primary text-white text-sm font-semibold hover:bg-cp_palette_primary hover:brightness-75 transition flex items-center justify-center gap-2"><img src="./assets/shopping-cart-add.png" /> Add to Cart</button>
      </div>
    </div>`;
      }).join('');

      // Pagination
      let pHtml = '';
      if (pages > 1) {
        pHtml += `<button onclick="goPage(${currentPage - 1})" class="page-btn px-3 py-2 rounded-lg border border-gray-200 text-sm ${currentPage === 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100'}" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
        for (let i = 1; i <= pages; i++) {
          if (i === 1 || i === pages || Math.abs(i - currentPage) <= 1) {
            pHtml += `<button onclick="goPage(${i})" class="transition-all duration-200 px-3 py-2 rounded-lg border border-gray-200 text-sm font-medium ${currentPage === i ? 'bg-cp_palette_primary text-white border-transparent' : 'hover:bg-gray-100'}">${i}</button>`;
          } else if (Math.abs(i - currentPage) === 2) {
            pHtml += `<span class="text-cp_text_secondary px-1">…</span>`;
          }
        }
        pHtml += `<button onclick="goPage(${currentPage + 1})" class="transition-all duration-200 px-3 py-2 rounded-lg border border-gray-200 text-sm ${currentPage === pages ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100'}" ${currentPage === pages ? 'disabled' : ''}>→</button>`;
      }
      document.getElementById('pagination').innerHTML = pHtml;
    }

    function goPage(p) {
      const pages = Math.ceil(filtered.length / PER_PAGE);
      if (p < 1 || p > pages) return;
      currentPage = p;
      renderProducts();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Apply URL params
    const params = new URLSearchParams(location.search);
    if (params.get('cat')) {
      document.querySelectorAll('.filter-checkbox').forEach(el => { if (el.value === params.get('cat')) el.checked = true; });
    }
    if (params.get('sort') === 'rating') document.getElementById('sort-select').value = 'rating';

    updateNavCount();
    applyFilters();

    const user = JSON.parse(localStorage.getItem('manpower_user') || 'null');
    if (user) { document.getElementById('nav-login-btn').textContent = '👤 ' + user.name.split(' ')[0]; document.getElementById('nav-login-btn').href = 'orders.html'; }
  </script>
</body>
