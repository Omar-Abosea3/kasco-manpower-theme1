<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManShop - Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .text-cp_palette_secondary {
      color: var(--palette-secondary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }

    /* Essential Custom Classes replaced by Tailwind utilities */
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="bg-cp_palette_primary shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="../index.html" class="text-blue-300 hover:text-white text-xs transition">← Portfolio</a>
          <div class="w-px h-5 bg-blue-700"></div>
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg p-1 bg-cp_palette_secondary overflow-hidden flex items-center justify-center font-bold text-white text-xs">
              <img src="../assets/logoipsum-409.png" class="object-cover w-full h-full" alt="logo">
            </div>
            <span class="text-white font-bold text-lg">ManShop</span>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-blue-200 hover:text-white text-sm transition">Home</a>
          <a href="products.html" class="text-blue-200 hover:text-white text-sm transition">Products</a>
          <a href="wishlist.html" class="text-blue-200 hover:text-white text-sm transition">Wishlist</a>
          <a href="orders.html" class="text-white text-sm font-medium border-b-2 border-secondary pb-0.5">Orders</a>
          <a href="cart.html"
            class="flex items-center gap-1 px-4 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition">
            🛒 Cart <span id="nav-cart-count"
              class="ml-1 bg-white text-cp_palette_primary text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
          </a>
          <a href="login.html" id="nav-login-btn" class="text-blue-200 hover:text-white text-sm transition">Login</a>
        </div>
      </div>
    </nav>
  </header>
  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <section class="bg-cp_palette_primary py-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-white mb-1">Order History</h1>
        <p id="orders-header-count" class="text-blue-200 text-sm"></p>
      </div>
    </section>

    <section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

      <div id="empty-state" class="hidden text-center py-20">
        <div class="text-6xl mb-4">📦</div>
        <h2 class="text-2xl font-bold text-cp_palette_primary mb-2">No Orders Yet</h2>
        <p class="text-cp_text_secondary mb-6">Start shopping and your orders will appear here.</p>
        <a href="products.html"
          class="px-8 py-3 rounded-xl bg-cp_palette_primary text-white font-semibold hover:bg-blue-900 transition">Browse
          Products →</a>
      </div>

      <!-- Filter bar -->
      <div id="filter-bar" class="hidden justify-between items-center mb-6">
        <select id="status-filter" onchange="render()"
          class="border border-gray-200 rounded-xl px-4 py-2 text-sm text-gray-700 bg-white">
          <option value="">All Orders</option>
          <option value="Processing">Processing</option>
          <option value="Shipped">Shipped</option>
          <option value="Delivered">Delivered</option>
          <option value="Cancelled">Cancelled</option>
        </select>
        <button onclick="generateSample()" class="text-xs text-cp_palette_secondary hover:underline">+ Generate Sample
          Orders</button>
      </div>

      <div id="orders-list" class="space-y-5"></div>
    </section>

    <!-- Order Detail Modal -->
    <section id="detail-modal"
      class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-start justify-center p-4 pt-16 overflow-y-auto">
      <div class="bg-white rounded-2xl max-w-lg w-full p-6">
        <div class="flex justify-between items-start mb-5">
          <h3 class="text-xl font-bold text-cp_palette_primary">Order Details</h3>
          <button onclick="document.getElementById('detail-modal').classList.add('hidden')"
            class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
        </div>
        <div id="modal-content"></div>
      </div>
    </section>
  </main>

  <footer class="bg-gray-900 py-8 mt-8">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-600 text-sm">© 2026 ManShop. <a href="../index.html"
          class="text-gray-500 hover:text-yellow-400 transition">← Portfolio</a></p>
    </div>
  </footer>

  <script>
    const STATUSES = ['Processing', 'Shipped', 'Delivered'];
    const STATUS_STYLES = {
      'Processing': 'bg-yellow-100 text-yellow-700',
      'Shipped': 'bg-blue-100 text-blue-700',
      'Delivered': 'bg-green-100 text-green-700',
      'Cancelled': 'bg-red-100 text-red-700',
    };

    function getOrders() { try { return JSON.parse(localStorage.getItem('manpower_orders') || '[]'); } catch (e) { return []; } }
    function setOrders(o) { localStorage.setItem('manpower_orders', JSON.stringify(o)); render(); }

    function updateNav() {
      const cart = JSON.parse(localStorage.getItem('manpower_cart') || '[]');
      document.getElementById('nav-cart-count').textContent = cart.reduce((s, i) => s + i.qty, 0);
    }

    function cancelOrder(id) {
      if (!confirm('Cancel this order?')) return;
      const orders = getOrders().map(o => o.id === id ? { ...o, status: 'Cancelled' } : o);
      setOrders(orders);
    }

    function viewDetails(id) {
      const order = getOrders().find(o => o.id === id);
      if (!order) return;
      document.getElementById('modal-content').innerHTML = `
    <div class="space-y-4">
      <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
        <span class="text-sm font-semibold text-cp_text_secondary">Order ID</span>
        <span class="font-mono font-bold text-cp_palette_primary text-sm">${order.id}</span>
      </div>
      <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
        <span class="text-sm font-semibold text-cp_text_secondary">Status</span>
        <span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider ${STATUS_STYLES[order.status] || 'bg-gray-100 text-gray-700'}">${order.status}</span>
      </div>
      <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
        <span class="text-sm font-semibold text-cp_text_secondary">Date</span>
        <span class="text-sm text-cp_palette_primary font-medium">${order.date}</span>
      </div>
      <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
        <span class="text-sm font-semibold text-cp_text_secondary">Total</span>
        <span class="font-bold text-cp_palette_primary">$${order.total}</span>
      </div>
      ${order.coupon ? `<div class="flex justify-between items-center p-3 bg-green-50 rounded-lg">
        <span class="text-sm font-semibold text-cp_text_secondary">Coupon Used</span>
        <span class="font-mono font-bold text-green-700 text-sm">${order.coupon}</span>
      </div>` : ''}
      <div>
        <h4 class="text-sm font-bold text-cp_palette_primary mb-3">Items</h4>
        <div class="space-y-2">
          ${order.items.map(item => `
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
              <div class="w-12 h-12 rounded-lg bg-gray-100 overflow-hidden flex-shrink-0">
                <a href="product-details.html?id=${item.id}"><img src="${item.image || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&h=400'}" alt="${item.name}" class="w-full h-full object-cover"></a>
              </div>
              <div class="flex-1">
                <a href="product-details.html?id=${item.id}"><div class="text-sm font-medium text-cp_palette_primary hover:text-cp_palette_secondary transition">${item.name}</div></a>
                <div class="text-xs text-cp_text_secondary">${item.qty} × $${item.price.toFixed(2)}</div>
              </div>
              <div class="font-semibold text-cp_palette_primary text-sm">$${(item.qty * item.price).toFixed(2)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    function generateSample() {
      const sampleItems = [
        { id: 1, name: "Pro Wireless Headphones", price: 189.99, icon: "🎧", brand: "SoundPro", sub: "Headphones", qty: 1 },
        { id: 8, name: "Running Sneakers", price: 119.99, icon: "👟", brand: "SpeedFit", sub: "Footwear", qty: 2 },
        { id: 12, name: "Anti-Aging Serum", price: 79.99, icon: "✨", brand: "GlowSkin", sub: "Skincare", qty: 1 },
      ];
      const orders = getOrders();
      const newOrders = [
        { id: 'ORD-' + Math.floor(Math.random() * 900000 + 100000), items: [sampleItems[0], sampleItems[2]], total: "273.67", date: "3/5/2026", status: "Delivered", coupon: "SAVE10" },
        { id: 'ORD-' + Math.floor(Math.random() * 900000 + 100000), items: [sampleItems[1]], total: "259.17", date: "3/8/2026", status: "Shipped", coupon: null },
      ];
      setOrders([...newOrders, ...orders]);
    }

    function render() {
      updateNav();
      let orders = getOrders();
      const filter = document.getElementById('status-filter')?.value;
      if (filter) orders = orders.filter(o => o.status === filter);

      document.getElementById('orders-header-count').textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

      if (orders.length === 0 && !getOrders().length) {
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('filter-bar').classList.remove('flex');
        document.getElementById('filter-bar').classList.add('hidden');
        document.getElementById('orders-list').innerHTML = '';
        return;
      }

      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('filter-bar').classList.remove('hidden');
      document.getElementById('filter-bar').classList.add('flex');

      if (orders.length === 0) {
        document.getElementById('orders-list').innerHTML = '<div class="text-center py-12 text-cp_text_secondary">No orders match this filter.</div>';
        return;
      }

      document.getElementById('orders-list').innerHTML = orders.map(order => `
    <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main p-5 transition-all duration-300 hover:shadow-[0_8px_30px_rgba(27,58,107,0.12)]">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-gray-50 rounded-xl overflow-hidden flex-shrink-0">
            <a href="product-details.html?id=${order.items[0]?.id}"><img src="${order.items[0]?.image || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&h=400'}" alt="Order item" class="w-full h-full object-cover"></a>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-0.5">
              <span class="font-mono font-bold text-cp_palette_primary text-sm">${order.id}</span>
              <span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-bold uppercase tracking-wider ${STATUS_STYLES[order.status] || 'bg-gray-100 text-gray-700'}">${order.status}</span>
            </div>
            <div class="text-xs text-cp_text_secondary">${order.date} · ${order.items.length} item${order.items.length !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="text-right">
          <div class="font-bold text-cp_palette_primary text-lg">$${order.total}</div>
          ${order.coupon ? `<div class="text-xs text-green-600">Coupon: ${order.coupon}</div>` : ''}
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <button onclick="viewDetails('${order.id}')" class="px-4 py-2 rounded-lg bg-cp_palette_primary text-white text-xs font-semibold hover:bg-blue-900 transition">View Details</button>
        ${order.status === 'Processing' ? `<button onclick="cancelOrder('${order.id}')" class="px-4 py-2 rounded-lg border border-red-200 text-red-600 text-xs font-semibold hover:bg-red-50 transition">Cancel Order</button>` : ''}
        <button onclick="reorder('${order.id}')" class="px-4 py-2 rounded-lg border border-cp_borders_main text-cp_palette_primary text-xs font-semibold hover:bg-gray-50 transition">Reorder</button>
      </div>
    </div>
  `).join('');
    }

    function reorder(id) {
      const order = getOrders().find(o => o.id === id);
      if (!order) return;
      let cart = JSON.parse(localStorage.getItem('manpower_cart') || '[]');
      order.items.forEach(item => {
        const idx = cart.findIndex(x => x.id === item.id);
        if (idx >= 0) cart[idx].qty += item.qty;
        else cart.push({ ...item });
      });
      localStorage.setItem('manpower_cart', JSON.stringify(cart));
      location.href = 'cart.html';
    }

    render();
    const user = JSON.parse(localStorage.getItem('manpower_user') || 'null');
    if (user) { document.getElementById('nav-login-btn').textContent = '👤 ' + user.name.split(' ')[0]; document.getElementById('nav-login-btn').href = 'orders.html'; }
  </script>
</body>

</html>
