<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManBook - Service Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="bg-cp_palette_primary shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="../index.html" class="text-blue-300 hover:text-white text-xs transition">← Portfolio</a>
          <div class="w-px h-5 bg-blue-700"></div>
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg bg-cp_palette_secondary flex items-center justify-center font-bold text-white text-xs overflow-hidden">
              <img src="https://placehold.co/40x40/C9972A/FFFFFF/png?text=MB" alt="MB"
                class="w-full h-full object-cover">
            </div>
            <span class="text-white font-bold text-lg">ManBook</span>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-blue-200 hover:text-white text-sm transition">Home</a>
          <a href="services.html" class="text-white text-sm font-medium border-b-2 border-secondary pb-0.5">Services</a>
          <a href="my-bookings.html" class="text-blue-200 hover:text-white text-sm transition">My Bookings</a>
          <a href="booking.html"
            class="px-4 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition flex items-center gap-2">
            <span class="w-4 h-4 overflow-hidden rounded-sm"><img
                src="https://placehold.co/40x40/C9972A/FFFFFF/png?text=Book" class="w-full h-full object-cover"></span>
            Book Now
          </a>
          <a href="login.html" id="nav-login-btn" class="text-blue-200 hover:text-white text-sm transition">Login</a>
        </div>
      </div>
    </nav>
  </header>
  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div id="page-content"></div>
    </section>
  </main>

  <footer class="bg-gray-900 py-8 mt-8">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-600 text-sm">© 2026 ManBook. <a href="../index.html"
          class="text-gray-500 hover:text-yellow-400 transition">← Portfolio</a></p>
    </div>
  </footer>

  <script>
    const SERVICES = [
      { id: 1, name: "Classic Haircut", category: "Hair", price: 45, duration: 45, rating: 4.9, reviews: 342, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Haircut", description: "A professional haircut tailored to your style preferences. Our skilled stylists will consult with you to understand your needs and deliver a cut that perfectly suits your face shape and lifestyle. Includes wash, cut, blow-dry, and style.", popular: true, includes: ["Consultation", "Shampoo & Conditioning", "Precision Cut", "Blow-dry & Styling"] },
      { id: 2, name: "Deep Tissue Massage", category: "Wellness", price: 95, duration: 60, rating: 4.8, reviews: 289, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Massage", description: "Full-body deep tissue massage targeting chronic muscle tension and stress relief. Our certified therapists use firm pressure and slow strokes to reach deeper layers of muscle and connective tissue.", popular: true, includes: ["60-minute session", "Premium oils", "Aromatherapy", "Post-session stretching"] },
      { id: 3, name: "Facial Treatment", category: "Skincare", price: 75, duration: 75, rating: 4.9, reviews: 178, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Facial", description: "Customized facial treatment using premium skincare products for radiant, healthy skin. Includes cleansing, exfoliation, mask, and moisturizing steps tailored to your skin type.", popular: true, includes: ["Skin analysis", "Deep cleansing", "Exfoliation", "Customized mask", "Moisturizing"] },
      { id: 4, name: "Manicure & Pedicure", category: "Nails", price: 65, duration: 90, rating: 4.7, reviews: 421, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Nails", description: "Complete nail care service including shaping, cuticle treatment, and polish. Choose from our wide range of premium nail colors.", popular: true, includes: ["Nail shaping", "Cuticle treatment", "Hand/foot soak", "Massage", "Premium polish"] },
      { id: 5, name: "Yoga Session", category: "Fitness", price: 50, duration: 60, rating: 4.8, reviews: 156, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Yoga", description: "Personalized one-on-one yoga instruction for all fitness levels. Our instructors will create a custom routine based on your goals and experience.", popular: true, includes: ["Fitness assessment", "Custom routine", "Breathing exercises", "Meditation", "Progress tracking"] },
      { id: 6, name: "Dental Checkup", category: "Medical", price: 120, duration: 30, rating: 4.9, reviews: 234, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Dental", description: "Comprehensive dental examination including digital X-rays and professional teeth cleaning by our expert dental team.", popular: true, includes: ["Digital X-rays", "Examination", "Professional cleaning", "Fluoride treatment", "Care advice"] },
      { id: 7, name: "Hair Coloring", category: "Hair", price: 120, duration: 120, rating: 4.8, reviews: 198, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Color", description: "Professional hair coloring service using premium, safe products. From subtle highlights to bold color transformations.", includes: ["Color consultation", "Allergy test", "Application", "Toning", "Style finish"] },
      { id: 8, name: "Hot Stone Massage", category: "Wellness", price: 130, duration: 90, rating: 4.9, reviews: 145, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Stone", description: "Luxurious hot stone massage using smooth, heated basalt stones to melt away tension and restore balance.", includes: ["90-minute session", "Heated basalt stones", "Aromatherapy oils", "Full body coverage", "Cooling stones"] },
    ];

    const TAKEN_SLOTS = ['09:00', '11:00', '14:30'];
    const ALL_SLOTS = ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00'];
    let selectedSlot = null;

    window.selectSlot = function (slot) {
      if (TAKEN_SLOTS.includes(slot)) return;
      selectedSlot = slot;
      document.querySelectorAll('.slot-btn').forEach(b => {
        b.classList.remove('border-cp_palette_secondary', 'bg-cp_palette_secondary', 'text-white');
        b.classList.add('border-[#DDE3EE]', 'text-cp_palette_primary');
        if (b.dataset.slot === slot) {
          b.classList.add('border-cp_palette_secondary', 'bg-cp_palette_secondary', 'text-white');
          b.classList.remove('border-[#DDE3EE]', 'text-cp_palette_primary');
        }
      });
      document.getElementById('selected-slot-display').textContent = slot;
      const btn = document.getElementById('book-btn');
      btn.href = `booking.html?service=${s.id}&slot=${slot}`;
      btn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
    };

    function render() {
      const params = new URLSearchParams(location.search);
      const id = parseInt(params.get('id') || '1');
      const s = SERVICES.find(x => x.id === id) || SERVICES[0];

      document.getElementById('page-content').innerHTML = `
    <div class="mb-6">
      <a href="services.html" class="text-sm text-cp_palette_secondary hover:underline flex items-center gap-1">← Back to Services</a>
    </div>
    <div class="grid lg:grid-cols-3 gap-8">
      <!-- Main -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Service Header -->
        <div class="bg-cp_palette_primary rounded-2xl p-8 flex items-start gap-6">
          <div class="w-20 h-20 bg-white bg-opacity-10 rounded-2xl flex items-center justify-center overflow-hidden flex-shrink-0">
          <img src="${s.icon}" alt="${s.name}" class="w-full h-full object-cover">
        </div>
          <div class="flex-1">
            <div class="text-xs text-cp_palette_secondary font-bold uppercase tracking-widest mb-2">${s.category}</div>
            <h1 class="text-3xl font-extrabold text-white mb-2">${s.name}</h1>
            <div class="flex items-center gap-4">
              <div class="flex items-center gap-1">
                <span class="text-yellow-400">★★★★★</span>
                <span class="text-blue-200 text-sm">${s.rating} (${s.reviews} reviews)</span>
              </div>
              <span class="text-blue-300 text-sm flex items-center gap-1">
                <span class="w-3 h-3 overflow-hidden rounded-full"><img src="https://placehold.co/20x20/1B3A6B/FFFFFF/png?text=T" class="w-full h-full object-cover"></span> ${s.duration} min
              </span>
            </div>
          </div>
        </div>

        <!-- Description -->
        <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main p-6">
          <h3 class="font-bold text-cp_palette_primary mb-3">About This Service</h3>
          <p class="text-cp_text_secondary text-sm leading-relaxed">${s.description}</p>
        </div>

        <!-- What's Included -->
        <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main p-6">
          <h3 class="font-bold text-cp_palette_primary mb-4">What's Included</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            ${s.includes.map(item => `
              <div class="flex items-center gap-2 text-sm text-cp_text_secondary">
                <span class="w-5 h-5 rounded-full bg-green-100 flex items-center justify-center overflow-hidden flex-shrink-0">
                  <img src="https://placehold.co/20x20/22C55E/FFFFFF/png?text=OK" class="w-full h-full object-cover">
                </span>
                ${item}
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Time Slots -->
        <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main p-6">
          <h3 class="font-bold text-cp_palette_primary mb-1">Available Time Slots</h3>
          <p class="text-cp_text_secondary text-xs mb-4">Select your preferred appointment time for today</p>
          <div class="grid grid-cols-3 sm:grid-cols-4 gap-2">
            ${ALL_SLOTS.map(slot => `
              <button data-slot="${slot}" onclick="selectSlot('${slot}')" class="slot-btn py-2.5 px-3 rounded-lg text-sm font-medium text-cp_palette_primary border-2 border-[#DDE3EE] transition-all duration-200 ${TAKEN_SLOTS.includes(slot) ? 'opacity-40 cursor-not-allowed line-through' : 'hover:border-cp_palette_secondary hover:text-cp_palette_secondary'}" ${TAKEN_SLOTS.includes(slot) ? 'disabled' : ''}>
                ${slot}
                ${TAKEN_SLOTS.includes(slot) ? '<div class="text-xs opacity-60">Taken</div>' : ''}
              </button>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- Booking Sidebar -->
      <div class="lg:col-span-1">
        <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main p-6 sticky top-24">
          <div class="text-center mb-5">
            <div class="text-4xl font-extrabold text-cp_palette_primary mb-1">$${s.price}</div>
            <div class="text-cp_text_secondary text-sm">per session · ${s.duration} minutes</div>
          </div>
          <div class="space-y-3 mb-6">
            <div class="flex justify-between text-sm">
              <span class="text-cp_text_secondary">Service</span>
              <span class="font-medium text-cp_palette_primary">${s.name}</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-cp_text_secondary">Duration</span>
              <span class="font-medium text-cp_palette_primary">${s.duration} min</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-cp_text_secondary">Selected slot</span>
              <span id="selected-slot-display" class="font-medium text-cp_palette_secondary">None selected</span>
            </div>
          </div>
          <a id="book-btn" href="booking.html?service=${s.id}" class="w-full py-3 rounded-xl bg-cp_palette_secondary text-white font-bold hover:opacity-90 transition flex items-center justify-center gap-2 opacity-50 cursor-not-allowed pointer-events-none">
            <span class="w-5 h-5 overflow-hidden rounded-md"><img src="https://placehold.co/40x40/C9972A/FFFFFF/png?text=Book" class="w-full h-full object-cover"></span> Book This Service
          </a>
          <p class="text-xs text-cp_text_secondary text-center mt-3">Select a time slot first</p>
          <div class="mt-4 pt-4 border-t border-cp_borders_main">
            <div class="flex items-center gap-2 text-xs text-cp_text_secondary mb-2">
              <span class="w-4 h-4 overflow-hidden rounded-full"><img src="https://placehold.co/20x20/22C55E/FFFFFF/png?text=OK" class="w-full h-full object-cover"></span> Free cancellation up to 24h
            </div>
            <div class="flex items-center gap-2 text-xs text-cp_text_secondary mb-2">
              <span class="w-4 h-4 overflow-hidden rounded-full"><img src="https://placehold.co/20x20/1B3A6B/FFFFFF/png?text=LK" class="w-full h-full object-cover"></span> Secure booking
            </div>
            <div class="flex items-center gap-2 text-xs text-cp_text_secondary">
              <span class="w-4 h-4 overflow-hidden rounded-full"><img src="https://placehold.co/20x20/FACC15/FFFFFF/png?text=ST" class="w-full h-full object-cover"></span> ${s.rating} star rated service
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

      // Override selectSlot to update href
      window.selectSlot = function (slot) {
        if (TAKEN_SLOTS.includes(slot)) return;
        selectedSlot = slot;
        document.querySelectorAll('.slot-btn').forEach(b => {
          b.classList.remove('selected');
          if (b.dataset.slot === slot) b.classList.add('selected');
        });
        document.getElementById('selected-slot-display').textContent = slot;
        const btn = document.getElementById('book-btn');
        btn.href = `booking.html?service=${s.id}&slot=${slot}`;
        btn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
      };
    }

    render();
    const user = JSON.parse(localStorage.getItem('manpower_user') || 'null');
    if (user) { document.getElementById('nav-login-btn').textContent = '👤 ' + user.name.split(' ')[0]; document.getElementById('nav-login-btn').href = 'my-bookings.html'; }
  </script>
</body>

</html>
