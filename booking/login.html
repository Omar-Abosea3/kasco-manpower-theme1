<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManBook - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="bg-cp_palette_primary shadow-lg">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="../index.html" class="text-blue-300 hover:text-white text-xs transition">← Portfolio</a>
          <div class="w-px h-5 bg-blue-700"></div>
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg bg-cp_palette_secondary flex items-center justify-center font-bold text-white text-xs overflow-hidden">
              <img src="https://placehold.co/40x40/C9972A/FFFFFF/png?text=MB" alt="MB"
                class="w-full h-full object-cover">
            </div>
            <span class="text-white font-bold text-lg">ManBook</span>
          </a>
        </div>
        <a href="signup.html" class="text-blue-200 hover:text-white text-sm transition">Create Account</a>
      </div>
    </nav>
  </header>
  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <section class="min-h-screen flex items-center justify-center px-4 py-16">
      <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
          <div class="bg-cp_palette_primary p-6 text-center">
            <div
              class="w-14 h-14 rounded-2xl bg-cp_palette_secondary flex items-center justify-center overflow-hidden mx-auto mb-3">
              <img src="https://placehold.co/100x100/C9972A/FFFFFF/png?text=User" alt="Login"
                class="w-full h-full object-cover">
            </div>
            <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
            <p class="text-blue-200 text-sm mt-1">Sign in to manage your bookings</p>
          </div>
          <div class="p-8">
            <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-5">
            </div>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-cp_palette_primary mb-2">Email Address</label>
                <input id="email" type="email" placeholder="you@example.com"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-cp_palette_primary focus:outline-none transition" />
              </div>
              <div>
                <label class="block text-sm font-semibold text-cp_palette_primary mb-2">Password</label>
                <div class="relative">
                  <input id="password" type="password" placeholder="••••••••"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm pr-12 focus:border-cp_palette_primary focus:outline-none transition" />
                  <button type="button"
                    onclick="const p=document.getElementById('password');p.type=p.type==='password'?'text':'password'"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁</button>
                </div>
              </div>
              <button onclick="doLogin()"
                class="w-full py-3 rounded-xl bg-cp_palette_primary text-white font-semibold hover:bg-blue-900 transition">Sign
                In</button>
            </div>
            <div class="mt-4 p-4 bg-blue-50 rounded-xl border border-blue-100">
              <p class="text-xs font-semibold text-cp_palette_primary mb-2">Demo Credentials</p>
              <p class="text-xs text-gray-600">Email: <span class="font-mono font-semibold">demo@manbook.com</span></p>
              <p class="text-xs text-gray-600">Password: <span class="font-mono font-semibold">demo123</span></p>
              <button
                onclick="document.getElementById('email').value='demo@manbook.com';document.getElementById('password').value='demo123'"
                class="mt-2 text-xs text-cp_palette_secondary hover:underline font-semibold">Auto-fill Demo →</button>
            </div>
            <div class="mt-6 pt-6 border-t border-gray-100 text-center">
              <p class="text-sm text-gray-600">No account? <a href="signup.html"
                  class="font-semibold text-cp_palette_secondary hover:underline">Create one free</a></p>
            </div>
          </div>
        </div>
        <p class="text-center mt-4 text-sm text-gray-500"><a href="index.html" class="hover:text-blue-700 transition">←
            Back to ManBook</a></p>
      </div>
    </section>
  </main>

  <script>
    const users = JSON.parse(localStorage.getItem('manpower_users') || '[]');
    if (!users.find(u => u.email === 'demo@manbook.com')) {
      users.push({ name: 'Demo User', email: 'demo@manbook.com', password: 'demo123' });
      localStorage.setItem('manpower_users', JSON.stringify(users));
    }

    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      if (!email || !pass) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.remove('hidden'); return; }
      const users = JSON.parse(localStorage.getItem('manpower_users') || '[]');
      const user = users.find(u => u.email === email && u.password === pass);
      if (!user) { errEl.textContent = 'Invalid email or password.'; errEl.classList.remove('hidden'); return; }
      localStorage.setItem('manpower_user', JSON.stringify({ name: user.name, email: user.email }));
      location.href = new URLSearchParams(location.search).get('redirect') || 'index.html';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>

</html>
