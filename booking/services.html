<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManBook - Services</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style id="dynamic-color-styles">
    @layer base {
      :root {
        --palette-primary: #1B3A6B;
        --palette-secondary: #C9972A;
        --background-default: #F4F6FA;
        --background-paper: #FFFFFF;
        --text-primary: #0F1F3D;
        --text-secondary: #5A6A85;
        --text-tertiary: #FFFFFF;
        --borders-main: #DDE3EE;
      }

      :dir(ltr) {
        font-family: 'Lexend Deca', system-ui, sans-serif;
      }

      :dir(rtl) {
        font-family: 'Changa', system-ui, sans-serif;
      }
    }

    .bg-cp_palette_primary {
      background-color: var(--palette-primary) !important
    }

    .bg-cp_palette_secondary {
      background-color: var(--palette-secondary) !important
    }

    .bg-cp_background_default {
      background-color: var(--background-default) !important
    }

    .bg-cp_background_paper {
      background-color: var(--background-paper) !important
    }

    .text-cp_text_primary {
      color: var(--text-primary) !important
    }

    .text-cp_text_secondary {
      color: var(--text-secondary) !important
    }

    .text-cp_text_tertiary {
      color: var(--text-tertiary) !important
    }

    .border-cp_borders_main {
      border-color: var(--borders-main) !important
    }

    .text-cp_palette_primary {
      color: var(--palette-primary) !important
    }

    .border-cp_palette_primary {
      border-color: var(--palette-primary) !important
    }

    .hover\:text-cp_palette_primary:hover {
      color: var(--palette-primary) !important
    }

    .hover\:bg-cp_palette_primary:hover {
      background-color: var(--palette-primary) !important
    }

    .focus\:border-cp_palette_primary:focus {
      border-color: var(--palette-primary) !important
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="bg-cp_palette_primary shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <a href="../index.html" class="text-blue-300 hover:text-white text-xs transition">← Portfolio</a>
          <div class="w-px h-5 bg-blue-700"></div>
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg bg-cp_palette_secondary flex items-center justify-center font-bold text-white text-xs overflow-hidden">
              <img src="https://placehold.co/40x40/C9972A/FFFFFF/png?text=MB" alt="MB"
                class="w-full h-full object-cover">
            </div>
            <span class="text-white font-bold text-lg">ManBook</span>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-blue-200 hover:text-white text-sm transition">Home</a>
          <a href="services.html" class="text-white text-sm font-medium border-b-2 border-secondary pb-0.5">Services</a>
          <a href="my-bookings.html" class="text-blue-200 hover:text-white text-sm transition">My Bookings</a>
          <a href="booking.html"
            class="px-4 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition flex items-center gap-2">
            <span class="w-4 h-4 overflow-hidden rounded-sm"><img
                src="https://placehold.co/40x40/C9972A/FFFFFF/png?text=Book" class="w-full h-full object-cover"></span>
            Book Now
          </a>
          <a href="login.html" id="nav-login-btn" class="text-blue-200 hover:text-white text-sm transition">Login</a>
        </div>
      </div>
    </nav>
  </header>
  <!-- Content -->
  <main class="bg-cp_background_default min-h-screen">
    <section class="bg-cp_palette_primary py-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-3xl font-bold text-white mb-2">Our Services</h1>
        <p class="text-blue-200 text-sm">Discover and book from our complete service catalogue</p>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <!-- Search + Sort -->
      <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <div class="relative flex-1">
          <span
            class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm overflow-hidden w-4 h-4 flex items-center justify-center">
            <img src="https://placehold.co/20x20/FFFFFF/5A6A85/png?text=S" alt="search icon"
              class="w-full h-full object-contain opacity-50">
          </span>
          <input id="search" type="text" placeholder="Search services..." oninput="applyFilters()"
            class="w-full border border-gray-200 rounded-xl pl-9 pr-4 py-3 text-sm bg-white focus:border-blue-500 transition" />
        </div>
        <select id="sort" onchange="applyFilters()"
          class="border border-gray-200 rounded-xl px-4 py-3 text-sm bg-white min-w-40">
          <option value="popular">Most Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Highest Rated</option>
          <option value="duration-asc">Shortest Duration</option>
        </select>
      </div>

      <!-- Category Filters -->
      <div class="flex flex-wrap gap-2 mb-8">
        <button onclick="setCategory('')" id="cat-all"
          class="cat-btn bg-cp_palette_primary text-white border-cp_palette_primary px-4 py-2 rounded-full border text-sm font-medium transition-all duration-200">All
          Services</button>
        <button onclick="setCategory('Hair')"
          class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white text-gray-700 transition-all duration-200 hover:border-cp_palette_primary hover:text-cp_palette_primary flex items-center gap-2">
          <span class="w-4 h-4 overflow-hidden rounded-sm flex-shrink-0"><img
              src="https://placehold.co/40x40/1B3A6B/FFFFFF/png?text=Hair" class="w-full h-full object-cover"></span>
          Hair
        </button>
        <button onclick="setCategory('Wellness')"
          class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white text-gray-700 transition-all duration-200 hover:border-cp_palette_primary hover:text-cp_palette_primary flex items-center gap-2">
          <span class="w-4 h-4 overflow-hidden rounded-sm flex-shrink-0"><img
              src="https://placehold.co/40x40/1B3A6B/FFFFFF/png?text=Well" class="w-full h-full object-cover"></span>
          Wellness
        </button>
        <button onclick="setCategory('Skincare')"
          class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white text-gray-700 transition-all duration-200 hover:border-cp_palette_primary hover:text-cp_palette_primary flex items-center gap-2">
          <span class="w-4 h-4 overflow-hidden rounded-sm flex-shrink-0"><img
              src="https://placehold.co/40x40/1B3A6B/FFFFFF/png?text=Skin" class="w-full h-full object-cover"></span>
          Skincare
        </button>
        <button onclick="setCategory('Nails')"
          class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white text-gray-700 transition-all duration-200 hover:border-cp_palette_primary hover:text-cp_palette_primary flex items-center gap-2">
          <span class="w-4 h-4 overflow-hidden rounded-sm flex-shrink-0"><img
              src="https://placehold.co/40x40/1B3A6B/FFFFFF/png?text=Nail" class="w-full h-full object-cover"></span>
          Nails
        </button>
        <button onclick="setCategory('Fitness')"
          class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white text-gray-700 transition-all duration-200 hover:border-cp_palette_primary hover:text-cp_palette_primary flex items-center gap-2">
          <span class="w-4 h-4 overflow-hidden rounded-sm flex-shrink-0"><img
              src="https://placehold.co/40x40/1B3A6B/FFFFFF/png?text=Fit" class="w-full h-full object-cover"></span>
          Fitness
        </button>
        <button onclick="setCategory('Medical')"
          class="cat-btn px-4 py-2 rounded-full border border-gray-200 text-sm font-medium bg-white text-gray-700 transition-all duration-200 hover:border-cp_palette_primary hover:text-cp_palette_primary flex items-center gap-2">
          <span class="w-4 h-4 overflow-hidden rounded-sm flex-shrink-0"><img
              src="https://placehold.co/40x40/1B3A6B/FFFFFF/png?text=Med" class="w-full h-full object-cover"></span>
          Medicalt-cover"></span> Medical
        </button>
      </div>

      <div class="flex justify-between items-center mb-5">
        <span id="results-count" class="text-sm font-semibold text-cp_palette_primary"></span>
      </div>

      <div id="services-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

      <div id="empty-state" class="hidden text-center py-16">
        <div class="text-5xl mb-3 w-16 h-16 mx-auto overflow-hidden">
          <img src="https://placehold.co/100x100/1B3A6B/FFFFFF/png?text=?"
            class="w-full h-full object-cover rounded-xl">
        </div>
        <h3 class="text-xl font-bold text-cp_palette_primary mb-2">No Services Found</h3>
        <p class="text-cp_text_secondary text-sm mb-4">Try a different search or category.</p>
        <button onclick="clearFilters()"
          class="px-6 py-2 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold">Clear Filters</button>
      </div>
    </section>
  </main>

  <footer class="bg-gray-900 py-8 mt-8">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-gray-600 text-sm">© 2026 ManBook. <a href="../index.html"
          class="text-gray-500 hover:text-yellow-400 transition">← Portfolio</a></p>
    </div>
  </footer>

  <script>
    const SERVICES = [
      { id: 1, name: "Classic Haircut", category: "Hair", price: 45, duration: 45, rating: 4.9, reviews: 342, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Haircut", description: "Professional haircut tailored to your style preferences. Includes wash, cut, and style.", popular: true },
      { id: 2, name: "Deep Tissue Massage", category: "Wellness", price: 95, duration: 60, rating: 4.8, reviews: 289, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Massage", description: "Full-body deep tissue massage targeting muscle tension and stress relief.", popular: true },
      { id: 3, name: "Facial Treatment", category: "Skincare", price: 75, duration: 75, rating: 4.9, reviews: 178, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Facial", description: "Customized facial treatment using premium skincare products for radiant skin.", popular: true },
      { id: 4, name: "Manicure & Pedicure", category: "Nails", price: 65, duration: 90, rating: 4.7, reviews: 421, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Nails", description: "Complete nail care service including shaping, cuticle treatment, and polish.", popular: true },
      { id: 5, name: "Yoga Session", category: "Fitness", price: 50, duration: 60, rating: 4.8, reviews: 156, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Yoga", description: "Personalized one-on-one yoga instruction for all fitness levels.", popular: true },
      { id: 6, name: "Dental Checkup", category: "Medical", price: 120, duration: 30, rating: 4.9, reviews: 234, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Dental", description: "Comprehensive dental examination including X-rays and professional cleaning.", popular: true },
      { id: 7, name: "Hair Coloring", category: "Hair", price: 120, duration: 120, rating: 4.8, reviews: 198, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Color", description: "Professional hair coloring service using premium, safe products." },
      { id: 8, name: "Hot Stone Massage", category: "Wellness", price: 130, duration: 90, rating: 4.9, reviews: 145, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Stone", description: "Luxurious hot stone massage to melt away tension and restore balance." },
      { id: 9, name: "Chemical Peel", category: "Skincare", price: 150, duration: 60, rating: 4.7, reviews: 89, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Peel", description: "Professional chemical peel treatment for smooth, rejuvenated skin." },
      { id: 10, name: "Gel Manicure", category: "Nails", price: 45, duration: 60, rating: 4.8, reviews: 312, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Gel", description: "Long-lasting gel manicure with a wide range of premium colors." },
      { id: 11, name: "Personal Training", category: "Fitness", price: 80, duration: 60, rating: 4.9, reviews: 201, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Training", description: "Customized one-hour workout session with a certified personal trainer." },
      { id: 12, name: "Eye Exam", category: "Medical", price: 90, duration: 45, rating: 4.8, reviews: 167, icon: "https://placehold.co/200x200/1B3A6B/FFFFFF/png?text=Eye", description: "Complete eye examination including vision test and prescription update." },
    ];

    let activeCategory = '';
    let filtered = [...SERVICES];

    function setCategory(cat) {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('bg-cp_palette_primary', 'text-white', 'border-cp_palette_primary');
        b.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
      });

      document.querySelectorAll('.cat-btn').forEach(b => {
        if ((cat === '' && b.id === 'cat-all') || (cat !== '' && b.textContent.includes(cat))) {
          b.classList.add('bg-cp_palette_primary', 'text-white', 'border-cp_palette_primary');
          b.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
        }
      });
      applyFilters();
    }

    function applyFilters() {
      const search = document.getElementById('search').value.toLowerCase();
      const sort = document.getElementById('sort').value;

      filtered = SERVICES.filter(s => {
        if (activeCategory && s.category !== activeCategory) return false;
        if (search && !s.name.toLowerCase().includes(search) && !s.description.toLowerCase().includes(search) && !s.category.toLowerCase().includes(search)) return false;
        return true;
      });

      if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
      else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
      else if (sort === 'duration-asc') filtered.sort((a, b) => a.duration - b.duration);
      else filtered.sort((a, b) => (b.popular ? 1 : 0) - (a.popular ? 1 : 0));

      render();
    }

    function clearFilters() {
      activeCategory = '';
      document.getElementById('search').value = '';
      document.getElementById('sort').value = 'popular';
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('bg-cp_palette_primary', 'text-white', 'border-cp_palette_primary');
        b.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
      });
      document.getElementById('cat-all').classList.add('bg-cp_palette_primary', 'text-white', 'border-cp_palette_primary');
      document.getElementById('cat-all').classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
      applyFilters();
    }

    function render() {
      document.getElementById('results-count').textContent = `${filtered.length} service${filtered.length !== 1 ? 's' : ''} found`;

      if (filtered.length === 0) {
        document.getElementById('services-grid').innerHTML = '';
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }
      document.getElementById('empty-state').classList.add('hidden');

      document.getElementById('services-grid').innerHTML = filtered.map(s => `
    <div class="bg-cp_background_paper rounded-xl border border-cp_borders_main transition-all duration-300 hover:-translate-y-1.5 hover:shadow-[0_16px_50px_rgba(27,58,107,0.18)] overflow-hidden">
      <div class="bg-cp_palette_primary p-6 flex items-center gap-4">
        <div class="w-16 h-16 bg-white bg-opacity-10 rounded-2xl flex items-center justify-center overflow-hidden flex-shrink-0">
          <img src="${s.icon}" alt="${s.name}" class="w-full h-full object-cover">
        </div>
        <div>
          <div class="text-xs text-cp_palette_secondary font-bold uppercase tracking-wide mb-0.5">${s.category}</div>
          <h3 class="font-bold text-white text-lg">${s.name}</h3>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-yellow-400 text-xs">${'★'.repeat(Math.floor(s.rating))}</span>
            <span class="text-blue-200 text-xs">${s.rating} (${s.reviews} reviews)</span>
          </div>
        </div>
      </div>
      <div class="p-5">
        <p class="text-cp_text_secondary text-sm mb-4 leading-relaxed">${s.description}</p>
        <div class="flex items-center gap-4 mb-5">
          <div class="flex items-center gap-1.5 text-sm text-cp_text_secondary"><span>⏱</span><span>${s.duration} min</span></div>
          <div class="flex items-center gap-1.5 text-sm text-cp_text_secondary"><span>💰</span><span>$${s.price}</span></div>
        </div>
        <div class="flex gap-2">
          <a href="service-details.html?id=${s.id}" class="flex-1 text-center py-2.5 rounded-lg border border-cp_borders_main text-cp_palette_primary text-sm font-medium hover:bg-gray-50 transition">Details</a>
          <a href="booking.html?service=${s.id}" class="flex-1 text-center py-2.5 rounded-lg bg-cp_palette_secondary text-white text-sm font-semibold hover:opacity-90 transition">Book Now →</a>
        </div>
      </div>
    </div>
  `).join('');
    }

    // Check URL param for category
    const urlCat = new URLSearchParams(location.search).get('cat');
    if (urlCat) setCategory(urlCat);
    else applyFilters();

    const user = JSON.parse(localStorage.getItem('manpower_user') || 'null');
    if (user) { document.getElementById('nav-login-btn').textContent = '👤 ' + user.name.split(' ')[0]; document.getElementById('nav-login-btn').href = 'my-bookings.html'; }
  </script>
</body>

</html>
